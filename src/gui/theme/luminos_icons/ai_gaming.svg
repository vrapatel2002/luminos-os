<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Gamepad body -->
  <rect x="2" y="7" width="20" height="12" rx="5" stroke="currentColor" stroke-width="1.5"/>
  <!-- D-pad cross -->
  <line x1="7" y1="11" x2="7" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="13" x2="9" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Action buttons -->
  <circle cx="16" cy="11" r="1" fill="currentColor"/>
  <circle cx="18" cy="13" r="1" fill="currentColor"/>
  <circle cx="16" cy="15" r="1" fill="currentColor"/>
  <circle cx="14" cy="13" r="1" fill="currentColor"/>
</svg>
