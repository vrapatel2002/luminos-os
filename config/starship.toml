# Starship config — macOS Luminos style
format = """
$directory$git_branch$git_status$python$nodejs$rust$golang
$character"""

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[python]
symbol = " "

[golang]
symbol = " "

[rust]
symbol = " "

[nodejs]
symbol = " "
