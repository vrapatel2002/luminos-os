# [CHANGE: claude-code | 2026-06-14] BUG-068 follow-up: repo mirror still shipped
# WhiteSur-Dark/-cursors despite the live 2026-06-11 fix. Synced to Breeze so GTK
# matches Qt/Plasma. Token-driven accent overrides live in gtk.css (generated from
# design/luminos-tokens.json). Decoration layout already matches kwinrc ButtonsOnLeft.
