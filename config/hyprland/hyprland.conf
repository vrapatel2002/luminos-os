# Luminos Hyprland Configuration
# Auto-generated for Arch Linux + ASUS ROG G14
# Managed by luminos-os — do not edit manually
# Regenerate: python3 -c "from compositor.compositor_config import write_config; write_config()"

# --- Monitor (G14 internal display) ---
monitor = eDP-1, preferred, auto, 1

# --- Environment ---
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = GDK_BACKEND, wayland
env = QT_QPA_PLATFORM, wayland
env = SDL_VIDEODRIVER, wayland
env = CLUTTER_BACKEND, wayland

# --- Autostart ---
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_RUNTIME_DIR
exec-once = dbus-update-activation-environment --systemd --all
exec-once = /usr/local/bin/luminos-session
exec-once = swww-daemon
exec-once = bash -c 'sleep 1 && swww clear 000a0f'
exec-once = systemctl --user start luminos-bar
exec-once = bash -c 'sleep 3 && systemctl --user start luminos-dock'

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        scroll_factor = 0.8
    }
}

# 3-finger swipe: left/right = switch workspace (Hyprland 0.47+ syntax)
gesture = 3, horizontal, workspace

# --- Appearance ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(0080FFaa)
    col.inactive_border = rgba(ffffff10)
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 12

    blur {
        enabled = yes
        size = 8
        passes = 2
        new_optimizations = yes
        xray = no
    }

    shadow {
        enabled = yes
        range = 20
        render_power = 3
        color = rgba(00204060)
    }

    active_opacity = 1.0
    inactive_opacity = 0.95
    dim_inactive = false
}

animations {
    enabled = yes

    bezier = luminos,      0.4, 0,    0.2, 1
    bezier = luminosEnter, 0.0, 0,    0.2, 1
    bezier = luminosExit,  0.4, 0,    1.0, 1

    animation = windows,    1, 2,   luminos,      slide
    animation = windowsOut, 1, 1.5, luminosExit,  slide
    animation = fade,       1, 2,   luminos
    animation = workspaces, 1, 2.5, luminos,      slidevert
    animation = layers,     1, 2,   luminosEnter, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# --- Window Rules ---

windowrule {
    name = no-rounding-fullscreen
    match:fullscreen = true
    rounding = 0
}

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# --- Keybindings ---
$mod = SUPER
$terminal = kitty

bind = $mod, Return,    exec, kitty
bind = $mod, Q,         killactive
bind = $mod, V,         togglefloating
bind = $mod, F,         fullscreen, 1
bind = $mod, E,         exec, dolphin
bind = $mod SHIFT, E,   exit
bind = $mod SHIFT, R,   exec, hyprctl reload

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Focus movement
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Window movement
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Move/resize with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# --- Luminos UI Bindings ---
# Quick Settings panel (Super+S)
bind = $mod, S, exec, luminos-quick-settings-toggle

# App Launcher (Super key tap)
bind = $mod, Super_L, exec, luminos-launcher-toggle

# --- Media & Hardware Keys ---
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous
