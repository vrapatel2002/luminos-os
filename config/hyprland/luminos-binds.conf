# config/hyprland/luminos-binds.conf
# Luminos OS keybindings for Hyprland.
# Source this from your main hyprland.conf:
#   source = /usr/share/luminos/hyprland/luminos-binds.conf

# Quick Settings — Super+S
bind = SUPER, S, exec, luminos-quick-settings-toggle

# App Launcher — Super key
bind = SUPER, Super_L, exec, luminos-launcher-toggle
