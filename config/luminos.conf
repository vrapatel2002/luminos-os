[daemon]
# socket path, log level
socket_path = /run/luminos/ai.sock
log_level = INFO

[models]
# paths to classifier.onnx and sentinel.onnx
classifier_path = /usr/lib/luminos/models/classifier.onnx
sentinel_path = /usr/lib/luminos/models/sentinel.onnx

[hardware]
# npu_enabled, igpu_enabled, nvidia_enabled
npu_enabled = true
igpu_enabled = true
nvidia_enabled = true

[zones]
# zone1_threshold, zone2_threshold
zone1_threshold = 0.90
zone2_threshold = 0.80

[power]
# default profile
default_profile = balanced
